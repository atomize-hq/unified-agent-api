[defaults.descriptor]
canonical_targets = ["darwin-arm64"]
wrapper_coverage_binding_kind = "generated_from_wrapper_crate"
always_on_capabilities = [
  "agent_api.config.model.v1",
  "agent_api.events",
  "agent_api.events.live",
  "agent_api.run",
]
target_gated_capabilities = []
config_gated_capabilities = []
backend_extensions = []
support_matrix_enabled = true
capability_matrix_enabled = true
capability_matrix_target = ""
docs_release_track = "crates-io"

[candidate.opencode]
display_name = "OpenCode"
research_urls = [
  "https://github.com/sst/opencode",
  "https://opencode.ai/docs/",
  "https://opencode.ai/docs/cli/",
  "https://www.npmjs.com/package/opencode-ai",
]
install_channels = [
  "curl -fsSL https://opencode.ai/install | bash",
  "npm install -g opencode-ai",
  "brew install sst/tap/opencode",
]
auth_notes = "Provider-auth flow required. Common path is `opencode auth login`, then select a configured provider before model-backed evaluation."

[candidate.gemini_cli]
display_name = "Gemini CLI"
research_urls = [
  "https://github.com/google-gemini/gemini-cli",
  "https://www.npmjs.com/package/@google/gemini-cli",
  "https://github.com/google-github-actions/run-gemini-cli",
]
install_channels = [
  "npm install -g @google/gemini-cli",
  "npx @google/gemini-cli",
]
auth_notes = "Google account and Gemini auth are required for realistic evaluation. Access posture may vary by account tier and enabled APIs."

[candidate.aider]
display_name = "aider"
research_urls = [
  "https://github.com/Aider-AI/aider",
  "https://aider.chat/",
  "https://pypi.org/project/aider-chat/",
]
install_channels = [
  "python -m pip install aider-install",
  "python -m pip install aider-chat",
]
auth_notes = "Requires model/provider credentials or service access for realistic evaluation. Local install and help surfaces are available before paid provider validation."

[candidate.goose]
display_name = "Goose"
research_urls = [
  "https://github.com/block/goose",
  "https://goose-docs.ai",
  "https://goose-docs.ai/docs/",
]
install_channels = [
  "brew install block/goose/goose",
  "curl -fsSL https://github.com/block/goose/releases/latest/download/download_cli.sh | bash",
]
auth_notes = "Provider credentials are required for full model-backed evaluation, but local CLI install and configuration flows are documented."

[candidate.openhands]
display_name = "OpenHands"
research_urls = [
  "https://github.com/All-Hands-AI/OpenHands",
  "https://docs.all-hands.dev/",
  "https://pypi.org/project/openhands-ai/",
]
install_channels = [
  "python -m pip install openhands-ai",
  "uv tool install openhands-ai",
]
auth_notes = "Provider credentials may be required for full automation runs; install and local startup documentation are public."
