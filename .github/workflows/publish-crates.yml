name: Publish crates.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-crates-main
  cancel-in-progress: false

jobs:
  prepare:
    name: Detect release
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.detect.outputs.should_publish }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: version
        name: Read root VERSION
        shell: bash
        run: |
          set -euo pipefail
          echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - id: detect
        name: Detect VERSION bump
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.ref }}" != "refs/heads/main" ]; then
              echo "Manual publish runs are only allowed from refs/heads/main; got '${{ github.ref }}'."
              echo "should_publish=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "should_publish=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${{ github.event.before }}"
          head_sha="${{ github.sha }}"

          if [ -z "$base_sha" ] || [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
            echo "No comparable base commit is available; skipping publish."
            echo "should_publish=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$base_sha" "$head_sha" -- VERSION; then
            echo "VERSION did not change in $base_sha..$head_sha; skipping publish."
            echo "should_publish=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "VERSION changed in $base_sha..$head_sha; publish workflow enabled."
          echo "should_publish=1" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate release
    needs: prepare
    if: ${{ needs.prepare.outputs.should_publish == '1' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: make preflight
        shell: bash
        run: |
          set -euo pipefail
          make preflight

      - name: Validate publishable versions and pins
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/validate_publish_versions.py

      - name: Validate publish readiness
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/check_publish_readiness.py

      - name: Unit test publish planner
        shell: bash
        run: |
          set -euo pipefail
          python3 -m unittest discover -s scripts -p 'test_*.py'

      - name: Preview publish plan
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/publish_crates.py \
            --plan \
            --root . \
            --release-version "${{ needs.prepare.outputs.version }}"

  publish:
    name: Publish workspace crates
    needs: [prepare, validate]
    if: ${{ needs.prepare.outputs.should_publish == '1' }}
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish crates in dependency order
        shell: bash
        env:
          OIDC_CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          BOOTSTRAP_CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail
          python3 scripts/publish_crates.py \
            --execute \
            --root . \
            --release-version "${{ needs.prepare.outputs.version }}"
