name: Only allow staging -> main

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

jobs:
  guard:
    # NOTE: This job name is intentionally `guard` because branch rulesets can require
    # status checks by their exact context name, which is derived from:
    #   "<workflow name> / <job name> (<event>)"
    # Keeping this stable avoids “Expected — Waiting for status to be reported” when the
    # ruleset requires `... / guard (pull_request)`.
    name: guard (pull_request)
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        shell: bash
        run: |
          set -euo pipefail
          echo "Base: $GITHUB_BASE_REF"
          echo "Head: $GITHUB_HEAD_REF"
          if [ "$GITHUB_BASE_REF" = "main" ] && [ "$GITHUB_HEAD_REF" != "staging" ]; then
            echo "Only PRs from 'staging' may target 'main'."
            exit 1
          fi
          echo "OK: staging -> main"

      - name: Require PR purpose label (staging -> main)
        if: ${{ github.base_ref == 'main' && github.head_ref == 'staging' }}
        shell: bash
        run: |
          set -euo pipefail
          # Enforce exactly one explicit staging -> main purpose label so main-branch CI intensity
          # stays intentional and repo releases are distinct from generic ops changes.
          #
          # Allowed labels:
          # - repo_release
          # - ops
          # - codex_release
          # - claude_code_release
          mapfile -t labels < <(jq -r '.pull_request.labels[].name' "$GITHUB_EVENT_PATH" || true)
          if ((${#labels[@]} == 0)); then
            echo "Labels: <none>"
          else
            printf 'Labels:\n'
            printf '  - %s\n' "${labels[@]}"
          fi

          allowed_count=0
          allowed_value=""
          for l in "${labels[@]}"; do
            case "$l" in
              repo_release|ops|codex_release|claude_code_release)
                allowed_count=$((allowed_count+1))
                allowed_value="$l"
                ;;
              *)
                ;;
            esac
          done

          if (( allowed_count != 1 )); then
            echo "staging -> main PRs must have exactly one purpose label."
            echo "Add exactly one of:"
            echo "  - repo_release"
            echo "  - ops"
            echo "  - codex_release"
            echo "  - claude_code_release"
            exit 1
          fi

          echo "OK: purpose label = ${allowed_value}"
