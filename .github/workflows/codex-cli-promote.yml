name: Codex CLI promote

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Bare semver to promote (example: 0.92.0)"
        required: true
        type: string
      dry_run:
        description: "Set true to validate and stage changes without opening a PR"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      ROOT: cli_manifests/codex
      REQUIRED_TARGET: x86_64-unknown-linux-musl
    outputs:
      validation_matrix: ${{ steps.matrix.outputs.validation_matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: staging

      - name: Validate inputs and required files
        shell: bash
        run: |
          set -euo pipefail
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test -f "${ROOT}/snapshots/${VERSION}/union.json"
          test -f "${ROOT}/artifacts.lock.json"

      - name: Compute validation matrix from committed union inputs
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          entries=()
          while IFS= read -r target; do
            case "$target" in
              aarch64-unknown-linux-musl)
                entries+=("{\"target_triple\":\"$target\",\"runs_on\":\"ubuntu-24.04-arm\",\"asset_name\":\"codex-$target.tar.gz\",\"binary_path\":\"./codex-$target\",\"extract\":true}")
                ;;
              x86_64-unknown-linux-musl)
                entries+=("{\"target_triple\":\"$target\",\"runs_on\":\"ubuntu-latest\",\"asset_name\":\"codex-$target.tar.gz\",\"binary_path\":\"./codex-$target\",\"extract\":true}")
                ;;
              aarch64-apple-darwin)
                entries+=("{\"target_triple\":\"$target\",\"runs_on\":\"macos-latest\",\"asset_name\":\"codex-$target.tar.gz\",\"binary_path\":\"./codex-$target\",\"extract\":true}")
                ;;
              x86_64-pc-windows-msvc)
                entries+=("{\"target_triple\":\"$target\",\"runs_on\":\"windows-latest\",\"asset_name\":\"codex-$target.exe\",\"binary_path\":\"./codex-$target.exe\",\"extract\":false}")
                ;;
              *)
                echo "Unsupported target_triple in committed union inputs: ${target}" >&2
                exit 1
                ;;
            esac
          done < <(jq -r '.inputs[].target_triple' "${ROOT}/snapshots/${VERSION}/union.json")

          printf '%s\n' "${entries[@]}" | jq -c -s '{include: .}' > validation_matrix.json
          jq -e '.include | length >= 1' validation_matrix.json > /dev/null
          jq -e --arg required "$REQUIRED_TARGET" '(.include | map(.target_triple) | index($required)) != null' validation_matrix.json > /dev/null

          echo "validation_matrix=$(cat validation_matrix.json)" >> "$GITHUB_OUTPUT"

  validate-target:
    name: "Validate (${{ matrix.target_triple }})"
    needs: prepare
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.validation_matrix) }}
    env:
      VERSION: ${{ inputs.version }}
      ROOT: cli_manifests/codex
    steps:
      - name: Enable Git long paths on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: git config --global core.longpaths true

      - uses: actions/checkout@v5
        with:
          ref: staging

      - uses: dtolnay/rust-toolchain@stable

      - name: Acquire pinned Codex CLI
        shell: bash
        env:
          TARGET: ${{ matrix.target_triple }}
          ASSET: ${{ matrix.asset_name }}
          BIN: ${{ matrix.binary_path }}
          EXTRACT: ${{ matrix.extract }}
        run: |
          set -euo pipefail
          URL="$(jq -r --arg v "$VERSION" --arg t "$TARGET" --arg a "$ASSET" '.artifacts[] | select(.codex_version==$v and .target_triple==$t and .asset_name==$a) | .download_url' "${ROOT}/artifacts.lock.json")"
          SHA="$(jq -r --arg v "$VERSION" --arg t "$TARGET" --arg a "$ASSET" '.artifacts[] | select(.codex_version==$v and .target_triple==$t and .asset_name==$a) | .sha256' "${ROOT}/artifacts.lock.json")"
          SIZE="$(jq -r --arg v "$VERSION" --arg t "$TARGET" --arg a "$ASSET" '.artifacts[] | select(.codex_version==$v and .target_triple==$t and .asset_name==$a) | .size_bytes' "${ROOT}/artifacts.lock.json")"
          test -n "$URL" && test "$URL" != "null"
          test -n "$SHA" && test "$SHA" != "null"
          test -n "$SIZE" && test "$SIZE" != "null"

          curl -fsSL -o codex.bin "$URL"
          python -c 'import hashlib, sys; p=sys.argv[1]; exp_sha=sys.argv[2]; exp_size=int(sys.argv[3]); b=open(p,"rb").read(); got_sha=hashlib.sha256(b).hexdigest(); got_size=len(b); assert got_sha==exp_sha, f"sha256 mismatch: expected={exp_sha} got={got_sha}"; assert got_size==exp_size, f"size mismatch: expected={exp_size} got={got_size}"; print(f"ok: {p} sha256={got_sha} size_bytes={got_size}")' codex.bin "$SHA" "$SIZE"

          if [ "$EXTRACT" = "true" ]; then
            MEMBER="$(tar -tzf codex.bin | awk 'NF && substr($0,length($0),1) != "/" {print; exit}')"
            test -n "$MEMBER"
            rm -rf _extract
            mkdir -p _extract
            tar -xzf codex.bin -C _extract "$MEMBER"
            install -m 0755 "_extract/$MEMBER" "$BIN"
          else
            cp codex.bin "$BIN"
          fi

          "$BIN" --version

      - name: Run target validated checks
        shell: bash
        env:
          BIN: ${{ matrix.binary_path }}
        run: |
          set -euo pipefail
          export CODEX_E2E_HOME="$(mktemp -d)"
          export CODEX_HOME="$CODEX_E2E_HOME"
          export CODEX_BINARY="$BIN"
          export CODEX_E2E_BINARY="$BIN"
          cargo test -p unified-agent-api-codex
          cargo test -p unified-agent-api-codex --examples
          cargo run -p unified-agent-api-codex --example feature_detection
          cargo run -p unified-agent-api-codex --example capability_snapshot -- "$CODEX_BINARY" "$CODEX_E2E_HOME/capabilities.json" auto
          cargo test -p unified-agent-api-codex --test cli_e2e -- --nocapture

  promote:
    runs-on: ubuntu-latest
    needs: [prepare, validate-target]
    env:
      VERSION: ${{ inputs.version }}
      DRY_RUN: ${{ inputs.dry_run }}
      ROOT: cli_manifests/codex
      REQUIRED_TARGET: x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: staging

      - uses: dtolnay/rust-toolchain@stable

      - name: Promote pointers and metadata
        shell: bash
        run: |
          set -euo pipefail

          printf '%s\n' "$VERSION" > "${ROOT}/latest_validated.txt"
          printf '%s\n' "$VERSION" > "${ROOT}/pointers/latest_validated/${REQUIRED_TARGET}.txt"
          cp "${ROOT}/snapshots/${VERSION}/union.json" "${ROOT}/current.json"

          VALIDATION_ARGS=()
          while IFS= read -r target; do
            [ -n "$target" ] || continue
            VALIDATION_ARGS+=(--passed-target "$target")
          done < <(jq -r '.inputs[].target_triple' "${ROOT}/snapshots/${VERSION}/union.json")

          cargo run -p xtask -- \
            codex-version-metadata \
            --version "$VERSION" \
            --status validated \
            "${VALIDATION_ARGS[@]}" \
            --root "${ROOT}"

          while IFS= read -r target; do
            [ -n "$target" ] || continue
            printf '%s\n' "$VERSION" > "${ROOT}/pointers/latest_validated/${target}.txt"
          done < <(jq -r '.validation.passed_targets[]?' "${ROOT}/versions/${VERSION}.json")

          while IFS= read -r target; do
            [ -n "$target" ] || continue
            printf '%s\n' "$VERSION" > "${ROOT}/pointers/latest_supported/${target}.txt"
          done < <(jq -r '.coverage.supported_targets[]?' "${ROOT}/versions/${VERSION}.json")

      - name: Validate promoted artifacts (hard gate)
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p xtask -- codex-validate --root "${ROOT}"

      - name: Render promotion summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Codex CLI promotion"
            echo ""
            echo "- promoted version: \`${VERSION}\`"
            echo "- required target: \`${REQUIRED_TARGET}\`"
            echo "- dry run: \`${DRY_RUN}\`"
          } > _codex_cli_promote_summary.md

      - name: Create promotion PR
        if: ${{ env.DRY_RUN != 'true' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.AUTOMATION_TOKEN || github.token }}
          base: staging
          commit-message: "chore: promote codex cli ${VERSION}"
          title: "chore: promote codex cli ${VERSION}"
          body-path: _codex_cli_promote_summary.md
          branch: "automation/codex-cli-promote-${{ inputs.version }}"
          delete-branch: true
