name: Claude Code live stream-json smoke

on:
  workflow_dispatch:
  push:
    branches:
      - feat/claude-code-live-stream-json

permissions:
  contents: read

jobs:
  public-api-guard:
    name: Public API guard (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: "Guard: no backend types in pub API"
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p xtask -- agent-api-backend-type-leak-guard

  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Linux smoke
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          docs/project_management/next/claude-code-live-stream-json/smoke/linux-smoke.sh

      - name: macOS smoke
        if: ${{ matrix.os == 'macos-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          docs/project_management/next/claude-code-live-stream-json/smoke/macos-smoke.sh

      - name: Windows smoke
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: docs/project_management/next/claude-code-live-stream-json/smoke/windows-smoke.ps1

  preflight-linux:
    name: Preflight (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: make preflight
        shell: bash
        run: |
          set -euo pipefail
          make preflight
