[[agents]]
agent_id = "opencode"
display_name = "OpenCode"
crate_path = "crates/opencode"
backend_module = "crates/agent_api/src/backends/opencode"
manifest_root = "cli_manifests/opencode"
package_name = "unified-agent-api-opencode"
canonical_targets = ["linux-x64", "darwin-arm64", "win32-x64"]

[agents.wrapper_coverage]
binding_kind = "generated_from_wrapper_crate"
source_path = "crates/opencode"

[agents.capability_declaration]
always_on = [
  "agent_api.run",
  "agent_api.events",
  "agent_api.events.live",
  "agent_api.config.model.v1",
  "agent_api.session.resume.v1",
  "agent_api.session.fork.v1",
]
backend_extensions = []

[agents.publication]
support_matrix_enabled = true
capability_matrix_enabled = true

[agents.release]
docs_release_track = "crates-io"

[agents.scaffold]
onboarding_pack_prefix = "opencode-cli-onboarding"

[agents.maintenance]

[[agents.maintenance.governance_checks]]
path = "docs/project_management/next/opencode-implementation/governance/seam-2-closeout.md"
required = true
comparison_kind = "markdown_capability_claim"
start_marker = "<!-- xtask-governance-check:opencode-capabilities:start -->"
end_marker = "<!-- xtask-governance-check:opencode-capabilities:end -->"
extraction_mode = "inline_code_ids"

[[agents.maintenance.governance_checks]]
path = "docs/project_management/next/opencode-implementation/governance/seam-3-closeout.md"
required = true
comparison_kind = "markdown_support_claim"
start_marker = "<!-- xtask-governance-check:opencode-support:start -->"
end_marker = "<!-- xtask-governance-check:opencode-support:end -->"
extraction_mode = "support_state_lines"

